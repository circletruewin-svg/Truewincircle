<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#042346" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TrueWin" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <title>TrueWinCircle</title>

    <!-- Splash screen styles render before the React bundle finishes
         downloading, so the user sees branding instantly instead of a
         blank white page on slow networks. The #app-splash element is
         removed from the DOM as soon as React mounts the app. -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #042346;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #app-splash {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #042346 0%, #06305f 50%, #08407d 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 16px;
        transition: opacity 200ms ease-out;
      }
      #app-splash.hidden { opacity: 0; pointer-events: none; }
      #app-splash .ring {
        width: 56px;
        height: 56px;
        border: 4px solid rgba(234, 179, 8, 0.25);
        border-top-color: #facc15;
        border-radius: 50%;
        animation: app-spin 700ms linear infinite;
      }
      @keyframes app-spin { to { transform: rotate(360deg); } }
      #app-splash .brand {
        font-weight: 800;
        font-size: 22px;
        letter-spacing: 0.5px;
      }
      #app-splash .brand .accent { color: #facc15; }
      #app-splash .tag {
        font-size: 12px;
        color: rgba(255,255,255,0.7);
        letter-spacing: 0.4px;
      }
    </style>

    <!-- Meta Pixel Code -->
    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod
            ? n.callMethod.apply(n, arguments)
            : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = true;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);
        t.async = true;
        t.src = v;
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      })(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");

      fbq("init", "2124893937915269");
      fbq("track", "PageView");
    </script>
    <!-- End Meta Pixel Code -->
  </head>

  <body>
    <!-- Meta Pixel Noscript Fallback -->
    <noscript>
      <img
        height="1"
        width="1"
        style="display: none"
        src="https://www.facebook.com/tr?id=2124893937915269&ev=PageView&noscript=1"
        alt=""
      />
    </noscript>

    <div id="root"></div>

    <!-- Visible immediately on first paint; main.jsx removes it after
         React mounts (see Frontend/src/main.jsx). -->
    <div id="app-splash">
      <div class="ring"></div>
      <div class="brand">TrueWin<span class="accent">Circle</span></div>
      <div class="tag">Loading…</div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
    <script src="https://www.google.com/recaptcha/enterprise.js?render=6LfgLr4rAAAAAGqoKzvROwaS0AFVDStNaUHL2h4M"></script>
  </body>
</html>
